<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: black;
            color: white;
        }
        .rb {
            border: red solid 1px;
        }
        #user_list {
            display: block;
            width: 100%;
            height: fit-content;
        }
        .user_item {
            background-color: black;
            color: red;
        }
    </style>
</head>
<body>
<h2>YouTubeBlock</h2>
<label for="enable_script">Enable<input id="enable_script" type="checkbox" placeholder="enable"></label>
<br>
<button id="reset">Reset Storage</button>
<p class="rb">Status: <span id="status">OFF</span></p>
<div id="user_list" class="rb"></div>
<script src="popup.js"></script>
</body>
</html>
